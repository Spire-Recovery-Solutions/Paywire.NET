name: Publish to NuGet
permissions:
  contents: read
  packages: write
on:
  push:
    branches:
      - main
      - alpha

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: nuget-

    - name: Set Branch-Specific Variables
      id: branch_vars
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/alpha" ]]; then
          echo "version_postfix=-alpha" >> $GITHUB_ENV
        else
          echo "version_postfix=" >> $GITHUB_ENV
        fi

    - name: Build
      run: |
        cd Paywire.NET
        dotnet restore
        dotnet build --configuration Release --no-restore

    - name: Test
      run: |
        cd Paywire.NET.Tests
        dotnet test --no-restore
      env:
        PWCLIENTID: ${{ secrets.PWCLIENTID }}
        PWUSER: ${{ secrets.PWUSER }}
        PWKEY: ${{ secrets.PWKEY }}
        PWPASS: ${{ secrets.PWPASS }}

    - name: Pack
      run: |
        cd Paywire.NET
        # Use GitHub Run Number as the Build number in the version
        dotnet pack --configuration Release --no-restore --output nupkg /p:Version=1.0.0.${{ github.run_number }}${{ env.version_postfix }}

    - name: Push to NuGet
      run: |
        cd Paywire.NET
        dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
